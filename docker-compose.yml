services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: austro-pos-app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: austro_pos
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: austro-pos-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: austro_pos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
